<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter — The Atlas</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-dark);
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .login-box {
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      border-top: 3px solid var(--accent-gold);
      padding: 36px 32px;
      text-align: center;
    }

    .login-emblem {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.4));
    }

    .login-title {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-heading);
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .login-subtitle {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    .login-field {
      position: relative;
      margin-bottom: 16px;
    }

    .login-field input {
      width: 100%;
      background: var(--bg-sidebar);
      border: 1px solid var(--border-dim);
      color: var(--text-primary);
      padding: 12px 16px;
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 17px;
      text-align: center;
      letter-spacing: 3px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    .login-field input:focus {
      border-color: var(--border-gold);
    }

    .login-field input::placeholder {
      letter-spacing: 1px;
      color: var(--text-dim);
      font-style: italic;
    }

    .login-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border-gold);
      color: var(--accent-gold);
      padding: 12px;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .login-btn:hover {
      background: rgba(201, 168, 76, 0.1);
      color: var(--link-hover);
    }

    .login-btn:active {
      background: rgba(201, 168, 76, 0.18);
    }

    .login-error {
      color: var(--danger-text);
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
    }

    .login-shake {
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }

    .login-footer {
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-box" id="login-box">
    <span class="login-emblem">⚔️</span>
    <div class="login-title">The Atlas</div>
    <div class="login-subtitle">Private Campaign Reference</div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="login-field">
        <input
          type="password"
          id="password-input"
          placeholder="Enter passphrase…"
          autocomplete="current-password"
          autofocus
        >
      </div>
      <button type="submit" class="login-btn">Enter the Library</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>

  <div class="login-footer">
    Restricted — Party Members Only
  </div>
</div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
<script>
  // If already logged in, skip login page
  if (isAuthenticated()) {
    const params = new URLSearchParams(window.location.search);
    window.location.replace(params.get('next') || '/eq-atlas/');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const pw   = document.getElementById('password-input').value;
    const err  = document.getElementById('login-error');
    const box  = document.getElementById('login-box');
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || '/eq-atlas/';

    err.textContent = '';

    const ok = await attemptLogin(pw, next);

    if (!ok) {
      err.textContent = 'Invalid passphrase. Turn back.';
      box.classList.remove('login-shake');
      void box.offsetWidth; // force reflow to restart animation
      box.classList.add('login-shake');
      document.getElementById('password-input').value = '';
      document.getElementById('password-input').focus();
    }
  }
</script>
</body>
</html>
